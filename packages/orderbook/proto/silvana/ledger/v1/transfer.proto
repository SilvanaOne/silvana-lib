syntax = "proto3";

package silvana.ledger.v1;

option go_package = "github.com/SilvanaOne/canton-agent/proto;ledger";

// ============================================================================
// Canton Coin (CC) transfer operations.
//
// Param messages used inside PrepareTransactionRequest.params (oneof).
// ============================================================================

// Transfer Canton Coin to a receiver. If the receiver has a TransferPreapproval,
// the transfer settles atomically. Otherwise it creates a TransferOffer.
message TransferCcParams {
  string receiver_party = 1;
  string amount = 2;
  optional string description = 3;
  string command_id = 4;
  optional string settlement_proposal_id = 5;
  repeated string amulet_cids = 6;  // Pre-selected amulet contract IDs (empty = server selects)
}

// Split CC into multiple amulets via AmuletRules_Transfer (MergeSplit)
message SplitCcParams {
  repeated string output_amounts = 1; // Amount for each output amulet (decimal strings)
  repeated string amulet_cids = 2;    // Input amulet contract IDs
}
